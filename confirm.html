<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fish Tales™ — Confirming your account...</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Montserrat — matches the rest of the site -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #001B2E;
      color: white;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    p { font-size: 18px; opacity: 0.8; }
  </style>
</head>
<body>
  <main>
    <div>
      <p>Confirming your account...<br>Opening Fish Tales.</p>
      <p id="fallback" style="display:none; font-size:14px; opacity:0.55; margin-top:16px;">If the app didn't open, please open Fish Tales manually and sign in.</p>
    </div>
  </main>
  <script>
    // Grab the full query string and fragment from the confirmation link
    const hash = window.location.hash;
    const search = window.location.search;

    // Build the deep link — pass everything through to the app
    const deepLink = 'fishtales://confirm' + search + hash;

    // Fire the deep link to open the app
    window.location.href = deepLink;

    // Show fallback message after 3 seconds if the app didn't open
    setTimeout(function() {
      var fallback = document.getElementById('fallback');
      if (fallback) fallback.style.display = 'block';
    }, 3000);
  </script>
</body>
</html>
